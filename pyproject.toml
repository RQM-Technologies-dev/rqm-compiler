[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rqm-compiler"
version = "0.1.0"
description = "Backend-neutral circuit compiler for the RQM quantum ecosystem"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/rqm_compiler"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"

[tool.ruff]
src = ["src"]
line-length = 100
